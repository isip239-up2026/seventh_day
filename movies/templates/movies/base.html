<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Кинотека{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #111; color: #eee; }
    .navbar { background: #1a1a2e !important; }
    .card { background: #1e1e2e; border: none; color: #eee; }
    .card:hover { transform: translateY(-4px); transition: .2s; }
    .text-muted { color: #aaa !important; }
    .badge-genre { background: #e94560; }
    footer { background: #1a1a2e; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'index' %}">🎬 Кинотека</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}">Все фильмы</a>
        </li>
        {# Студент 7: добавить ссылку «Топ фильмов» #}
        {# Студент 8: добавить ссылку «Хочу посмотреть» #}
      </ul>
      {# Студент 5: добавить форму поиска #}
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 mt-4">
  <small>Кинотека &copy; 2024</small>
</footer>

</body>
</html>
